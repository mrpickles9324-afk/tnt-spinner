<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        .wrapper { position: relative; width: 700px; height: 160px; background: rgba(20, 20, 20, 0.9); border: 3px solid #444; overflow: hidden; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); transition: transform 0.1s; }
        .shake { animation: shakeEffect 0.5s ease-in-out 2; }
        @keyframes shakeEffect { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(-5px, 5px) rotate(-1deg); } 50% { transform: translate(5px, -5px) rotate(1deg); } 75% { transform: translate(-5px, -5px) rotate(-1deg); } }
        .pointer { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #ffcc00; z-index: 10; filter: drop-shadow(0 2px 5px black); }
        .track { display: flex; position: absolute; left: 0; top: 0; height: 100%; align-items: center; will-change: transform; }
        .item { width: 120px; height: 140px; margin: 0 5px; background: #222; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; border-bottom: 5px solid #444; }
        .tnt-block { width: 80px; height: 80px; position: relative; display: flex; align-items: center; justify-content: center; }
        .tnt-red { background: #b02e26; border: 4px solid #85231e; }
        .tnt-blue { background: #3c44a9; border: 4px solid #2d3380; }
        .tnt-mega { background: linear-gradient(45deg, #4b0082, #800080, #4b0082); background-size: 200% 200%; border: 4px solid #2e004d; animation: glowMega 2s linear infinite; }
        @keyframes glowMega { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .tnt-block::after { content: "TNT"; position: absolute; background: #f0f0f0; color: #333; width: 100%; height: 22px; font-size: 16px; display: flex; align-items: center; justify-content: center; border-top: 2px solid #333; border-bottom: 2px solid #333; font-weight: bold; }
        .tnt-mega::after { content: "MEGA"; background: #ffd700; color: #000; font-size: 14px; }
        .rarity-red { border-bottom-color: #ff4444; }
        .rarity-blue { border-bottom-color: #0088ff; }
        .rarity-mega { border-bottom-color: #aa00ff; }
        button { margin-top: 25px; padding: 12px 45px; background: #ff4444; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 22px; text-transform: uppercase; box-shadow: 0 5px 0 #b33030; }
        button:active { transform: translateY(2px); box-shadow: 0 3px 0 #b33030; }
        button:disabled { background: #555; box-shadow: 0 5px 0 #333; opacity: 0.7; }
        #log { position: fixed; bottom: 10px; color: white; font-size: 12px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="mainWrapper" class="wrapper">
        <div class="pointer"></div>
        <div id="track" class="track"></div>
    </div>
    <button id="spinBtn" onclick="spin()">ВЗОРВАТЬ ТНТ</button>
    <div id="log">Ожидание запуска...</div>

    <script>
        const track = document.getElementById('track');
        const wrapper = document.getElementById('mainWrapper');
        const btn = document.getElementById('spinBtn');
        const log = document.getElementById('log');
        const itemWidth = 130; 
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, type, dur, vol = 0.1) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        // Функция копирования команды (для удобства)
        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            log.innerText = "Команда скопирована!";
        }

        function init() {
            track.innerHTML = '';
            for (let i = 0; i < 150; i++) {
                const rand = Math.random();
                let type, rarity, isMega = false;
                if (rand < 0.20) { type = 'tnt-mega'; rarity = 'rarity-mega'; isMega = true; }
                else if (rand < 0.50) { type = 'tnt-blue'; rarity = 'rarity-blue'; }
                else { type = 'tnt-red'; rarity = 'rarity-red'; }
                const div = document.createElement('div');
                div.className = `item ${rarity}`;
                if (isMega) div.dataset.mega = "true";
                div.innerHTML = `<div class="tnt-block ${type}"></div>`;
                track.appendChild(div);
            }
        }

        function spin() {
            if (btn.disabled) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            btn.disabled = true;
            wrapper.classList.remove('shake');
            log.innerText = "Рулетка крутится...";
            
            const landingIdx = 115 + Math.floor(Math.random() * 15); 
            const totalShift = (landingIdx * itemWidth) - 350 + (itemWidth / 2);
            
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';
            
            let lastPos = 0;
            const tickSound = () => {
                const curPos = Math.abs(track.getBoundingClientRect().left);
                if (Math.floor(curPos / itemWidth) > lastPos) {
                    playSound(400, 'sine', 0.05, 0.03);
                    lastPos = Math.floor(curPos / itemWidth);
                }
                if (btn.disabled) requestAnimationFrame(tickSound);
            };

            setTimeout(() => {
                track.style.transition = 'transform 8s cubic-bezier(0.1, 0, 0.05, 1)';
                track.style.transform = `translateX(-${totalShift}px)`;
                requestAnimationFrame(tickSound);
            }, 50);

            setTimeout(() => {
                btn.disabled = false;
                const win = track.children[landingIdx];
                const isMega = win.dataset.mega === "true";
                const isBlue = win.querySelector('.tnt-block').classList.contains('tnt-blue');
                
                let command = "";
                if (isMega) {
                    wrapper.classList.add('shake');
                    playSound(40, 'sawtooth', 1.5, 0.4);
                    command = "execute at {playername} run summon area_effect_cloud ~ ~ ~ {Passengers:[{id:tnt,Fuse:80}]}";
                    log.innerText = "ВЫПАЛ MEGA TNT!";
                } else if (isBlue) {
                    playSound(200, 'square', 0.5, 0.1);
                    command = "bedrock tnt 1 {nickname}";
                    log.innerText = "ВЫПАЛ BLUE TNT!";
                } else {
                    playSound(150, 'square', 0.4, 0.1);
                    command = "execute at {playername} run summon tnt ~ ~ ~";
                    log.innerText = "ВЫПАЛ RED TNT!";
                }
                
                // Копируем команду в буфер
                copyToClipboard(command);

            }, 8200);
        }

        init();
        window.onkeydown = (e) => { if (e.code === 'Space') spin(); };
    </script>
</body>
</html>
